name: Catcast ULTRA Update

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python catcast.py

      - run: |
          git config --global user.name "ultra-bot"
          git config --global user.email "bot@github.com"
          git add catcast.m3u8 logs.txt
          git commit -m "ULTRA update" || echo "No changes"
          git push
